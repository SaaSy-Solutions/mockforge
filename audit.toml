# Ignored advisories for `cargo audit`. Consumed by
# `scripts/precommit/cargo_audit.py`, which reads this file and passes each
# ID as `--ignore` to cargo-audit (the cargo-audit CLI has no native config
# file support).
#
# When adding an entry, include a short reason explaining why it can't be
# fixed by upgrading. Periodically re-check: `scripts/precommit/cargo_audit.py`
# will still pass once an ignored advisory is resolved upstream, but the
# entry should be removed to keep the list honest.

[advisories]
ignore = [
    # quinn-proto (HTTP/3 / QUIC) — transitive via reqwest/hyper; no fix
    # version published yet as of 2026-04.
    { id = "RUSTSEC-2026-0037", reason = "quinn-proto DoS — transitive dep, no patched version available" },

    # quinn-proto remote memory exhaustion (published 2026-06-22, fixed
    # in >=0.11.15). Reaches mockforge-desktop only via Tauri's reqwest
    # stack; no production server uses HTTP/3/QUIC. Clears once Tauri
    # bumps its reqwest pin.
    { id = "RUSTSEC-2026-0185", reason = "quinn-proto memory exhaustion — reaches only mockforge-desktop via Tauri reqwest; no server-side QUIC use" },

    # lopdf stack overflow on deeply nested PDF objects (published
    # 2026-06-21). Pulled in only through `printpdf` for mockforge-
    # reporting's PDF export; we don't parse untrusted PDFs server-
    # side, only emit them. Clears once printpdf bumps its lopdf pin.
    { id = "RUSTSEC-2026-0187", reason = "lopdf stack overflow on deeply nested PDFs — only on the mockforge-reporting PDF emit path; we don't parse untrusted PDFs" },

    # quick-xml < 0.41.0 DoS advisories (published 2026-07-02, fixed in
    # >=0.41.0). #919 assumed the only <0.41 path was registry-server's direct
    # SAML dep parsing untrusted XML, but that turned out wrong on two counts:
    # (1) the SAML code parses via regex (`extract_xml_value`), not quick-xml,
    # so the direct dep was UNUSED — now bumped to 0.41 anyway so any future
    # use is safe; (2) the vulnerable 0.31 in the tree is really pulled by
    # `azure_core` 0.21 (the feature-gated Azure blob-storage SDK), which
    # parses TRUSTED Azure responses, not untrusted user input. That plus the
    # transitive 0.37/0.38/0.39 can't reach 0.41 without an azure-SDK / upstream
    # bump, so these stay ignored. DoS-only (not RCE), no untrusted-XML path.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml quadratic runtime on duplicate attrs (DoS) — remaining <0.41 copies are azure-SDK (trusted XML) + transitive; no untrusted-XML path (#919)" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml unbounded namespace allocation (DoS) — remaining <0.41 copies are azure-SDK (trusted XML) + transitive; no untrusted-XML path (#919)" },

    # wasmtime 36.x is pinned by mockforge-plugin-loader's current API
    # surface. Every one of these needs a major-version bump to resolve,
    # which is a tracked follow-up (see plugin-loader).
    { id = "RUSTSEC-2026-0085", reason = "wasmtime flags lifting panic — blocked by wasmtime major bump in plugin-loader" },
    { id = "RUSTSEC-2026-0086", reason = "wasmtime 64-bit tables host data leakage — blocked by wasmtime major bump" },
    { id = "RUSTSEC-2026-0087", reason = "wasmtime f64x2.splat x86_64 segfault — blocked by wasmtime major bump" },
    { id = "RUSTSEC-2026-0088", reason = "wasmtime pooling allocator instance leakage — blocked by wasmtime major bump" },
    { id = "RUSTSEC-2026-0089", reason = "wasmtime Winch table.fill panic — blocked by wasmtime major bump" },
    { id = "RUSTSEC-2026-0091", reason = "wasmtime string transcoding OOB write — blocked by wasmtime major bump" },
    { id = "RUSTSEC-2026-0092", reason = "wasmtime UTF-16 misaligned transcoding panic — blocked by wasmtime major bump" },
    { id = "RUSTSEC-2026-0093", reason = "wasmtime UTF-16 to latin1+utf16 OOB read — blocked by wasmtime major bump" },
    { id = "RUSTSEC-2026-0094", reason = "wasmtime Winch table.grow return masking — blocked by wasmtime major bump" },
    { id = "RUSTSEC-2026-0095", reason = "wasmtime Winch sandbox-escaping memory access — blocked by wasmtime major bump" },
    { id = "RUSTSEC-2026-0096", reason = "wasmtime aarch64 Cranelift sandbox escape — blocked by wasmtime major bump" },
    { id = "RUSTSEC-2026-0114", reason = "wasmtime oversize-table allocation panic (DoS) — fixed in 36.0.8 but pinned at 36.0.6 by plugin-loader; clears with same wasmtime major bump" },
    { id = "RUSTSEC-2026-0149", reason = "wasmtime-wasi path_open(TRUNCATE) bypasses FilePerms::WRITE — same wasmtime 36.x pin as the rest of this group; clears with the wasmtime major bump in plugin-loader" },
    { id = "RUSTSEC-2026-0188", reason = "wasmtime-wasi 36.0.11 advisory — published 2026-06; same wasmtime 36.x pin as the rest of this group; clears with the plugin-loader major bump" },

    # rustls-webpki pinned at multiple versions by transitive deps
    # (aws-sdk via rustls 0.21, rumqttc via rustls 0.22, axum-server via
    # rustls 0.23). Can't resolve without coordinated upstream bumps.
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki URI name constraints — pinned by transitive deps across 3 rustls majors" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki wildcard name constraints — pinned by transitive deps across 3 rustls majors" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki CRL parsing panic — pinned by transitive deps across 3 rustls majors" },
]
