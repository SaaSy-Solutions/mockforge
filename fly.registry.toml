# Fly.io configuration for MockForge Registry Server
# Deploy: flyctl deploy --config fly.registry.toml

app = "mockforge-registry"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.registry"

[env]
  PORT = "8080"
  RUST_LOG = "mockforge_registry_server=info,tower_http=info"
  SKIP_MIGRATIONS = "false"

# Secrets to set via `flyctl secrets set`:
#   DATABASE_URL          - PostgreSQL connection string (Neon: postgresql://...?sslmode=require)
#   JWT_SECRET            - Random 256-bit secret for JWT signing
#   FLYIO_API_TOKEN       - Fly.io API token for deploying hosted mocks
#   FLYIO_ORG_SLUG        - Fly.io organization slug
#   CORS_ALLOWED_ORIGINS  - "https://app.mockforge.dev"
#   REDIS_URL             - Optional: Redis connection string
#   S3_BUCKET             - R2 bucket name (e.g. "mockforge-storage")
#   S3_REGION             - "auto" for Cloudflare R2
#   S3_ENDPOINT           - R2 endpoint (https://<ACCOUNT_ID>.r2.cloudflarestorage.com)
#   AWS_ACCESS_KEY_ID     - R2 API token Access Key ID
#   AWS_SECRET_ACCESS_KEY - R2 API token Secret Access Key
#   STRIPE_SECRET_KEY     - Stripe API key
#   STRIPE_WEBHOOK_SECRET - Stripe webhook signing secret
#   SMTP_HOST             - "smtp-relay.brevo.com"
#   SMTP_PORT             - "587"
#   SMTP_USERNAME         - Brevo login email
#   SMTP_PASSWORD         - Brevo SMTP key

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/metrics/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
