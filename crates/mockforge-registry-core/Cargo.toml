[package]
name = "mockforge-registry-core"
version.workspace = true
edition = "2021"
resolver = "2"
authors = ["MockForge Contributors"]
description = "Shared domain models, storage abstractions, and OSS-safe handlers for MockForge's registry backends (SaaS Postgres + OSS SQLite admin UI)."
license = "MIT OR Apache-2.0"
repository = "https://github.com/SaaSy-Solutions/mockforge"
homepage = "https://mockforge.dev"
documentation = "https://docs.rs/mockforge-registry-core"
readme = "README.md"
keywords = ["mock", "api", "testing", "registry"]
categories = ["development-tools", "web-programming"]
publish = false

[features]
# At least one backend must be selected.
default = ["postgres"]
postgres = ["sqlx/postgres"]
sqlite = ["sqlx/sqlite"]

[dependencies]
# Web framework pieces (axum extractors live here so that both the SaaS binary
# and the OSS admin UI can reuse middleware like AuthUser).
axum = { version = "0.8", features = ["macros"] }
tower = "0.5"

# Async runtime
tokio = { version = "1.48", features = ["sync", "rt", "macros"] }

# Database — shared between Postgres (SaaS) and SQLite (OSS).
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "uuid", "chrono", "migrate", "rust_decimal", "macros", "json"] }

# Misc crypto / encoding helpers used by model types.
base64 = "0.21"
rand = "0.8"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Auth primitives
jsonwebtoken = "9.2"
bcrypt = "0.15"
totp-lite = "2.0"
qrcode = "0.14"
data-encoding = "2.5"
ring = "0.17"
sha1 = "0.10"

# Utilities
anyhow = "1.0"
thiserror = "1.0"
async-trait = "0.1"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
rust_decimal = "1.33"

# Crypto / hashing
sha2 = "0.10"
hex = "0.4"
# Ed25519 verification for publisher SBOM attestations.
ed25519-dalek = { version = "2", default-features = false, features = ["std"] }

# RFC 8785 (JCS) canonical JSON for the SBOM attestation verifier, so
# "the same" SBOM produced by different JSON libraries signs to the
# same bytes. Pulled from the workspace so the CLI signer and this
# verifier can't drift apart — see `[workspace.dependencies]` in the
# repo root Cargo.toml.
serde_jcs = { workspace = true }

# Precise SEMVER-range matching against the OSV advisory cache.
semver = "1.0"

# Validation
validator = { version = "0.20", features = ["derive"] }

[dev-dependencies]
tokio = { version = "1.48", features = ["macros", "rt-multi-thread"] }

# Canonical PEP 440 implementation. Used as an oracle in the OSV
# normalizer conformance test: we feed pep440_rs the same pairs we
# feed our normalizer and assert they agree on ordering. Keeps our
# PyPI rewrite honest without us needing to re-implement the spec.
pep440_rs = "0.7"

# Property-based fuzzing for the JCS canonicalization layer. We
# generate arbitrary JSON values and assert `canonicalize` is
# idempotent and re-canonicalizes to identical bytes — catches silent
# regressions in the serde_jcs dependency or in our pipeline around it.
proptest = "1.5"
tempfile = "3"
