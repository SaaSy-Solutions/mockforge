[package]
name = "mockforge-plugin-host"
# Not published to crates.io: internal MockForge cloud sidecar (Phase 2 scaffold), must not ship to crates.io.
# Flip to true + add to scripts/publish-crates.sh CRATES when it gains a published consumer.
publish = false
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true
keywords = ["plugin", "wasm", "sandbox", "cloud", "sidecar"]
categories = ["development-tools"]
description = "Sidecar plugin runtime host for MockForge cloud — Phase 2 scaffold"

[lints.rust]
missing_docs = "deny"

[lib]
name = "mockforge_plugin_host"
path = "src/lib.rs"

[[bin]]
name = "mockforge-plugin-host"
path = "src/main.rs"

[dependencies]
# Reuse the existing plugin-loader's Wasmtime integration:
# MemoryTracker (PR #396) and InvocationMetricsBus (PR #388).
mockforge-plugin-loader = { version = "0.3.70", path = "../mockforge-plugin-loader" }
mockforge-plugin-core = { version = "0.3.70", path = "../mockforge-plugin-core" }

# Async runtime + Unix socket I/O
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "signal", "time", "sync", "io-util"] }

# Serialization (JSON-over-Unix-socket protocol — easy to migrate to
# protobuf later without breaking out the wire format separately)
serde.workspace = true
serde_json.workspace = true

# Error handling
anyhow.workspace = true
thiserror.workspace = true

# Logging — extend the workspace tracing-subscriber feature set
# locally so the bin can use `EnvFilter` for runtime log-level
# control (workspace default is `fmt` only).
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["fmt", "env-filter"] }

# Utility (need `serde` for the JSON IPC protocol; the workspace
# default is `v4` only, so we extend it locally rather than bumping
# the whole workspace's footprint).
uuid = { workspace = true, features = ["serde"] }

# WASM blob handling: LoadPlugin carries the module as base64 in
# the request body (registry-fetch path is a separate follow-up).
# PluginLoadContext takes a filesystem path so we materialize the
# bytes to a tempfile that lives for the plugin's lifetime.
base64 = "0.22"
tempfile = { workspace = true }

# Ed25519 signature verification on the WASM bytes (RFC §7.2 step 3).
# Matches the scheme used by the registry's UserPublicKey +
# verify_sbom_attestation so trust roots can be shared once the
# registry-fetch path lands.
ed25519-dalek = { version = "2", default-features = false, features = ["std"] }

# Platform signing-root rotation verifier (issue #568). The host
# never *mints* signatures — it only verifies incoming rotation
# events against its currently-trusted set — so we depend on the
# crate without the `aws-kms` feature (which would pull in the
# AWS SDK transitive tree).
mockforge-platform-signing = { version = "0.3.139", path = "../mockforge-platform-signing" }

# HTTP client for the kill-switch blocklist poll task (RFC §8.3)
# and the trust-root refresh loop (issue #549).
reqwest = { workspace = true }
# Workspace chrono already enables serde — used by BlocklistEntry's
# `revoked_at` field on the wire format.
chrono = { workspace = true }
# URL validation for the trust-root endpoint configured via env.
url.workspace = true

[dev-dependencies]
tempfile = { workspace = true }
# HTTP mock server for the trust-root refresh integration tests.
wiremock = "0.6"
# Async runtime extras for time-based integration tests.
tokio = { workspace = true, features = ["test-util"] }
