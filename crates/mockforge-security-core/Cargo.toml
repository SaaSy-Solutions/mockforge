[package]
name = "mockforge-security-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Security and encryption primitives for MockForge"
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["security", "encryption", "mock", "testing"]
categories = ["development-tools", "cryptography"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true, features = ["serde"] }
tracing = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
once_cell = { workspace = true }
async-trait = { workspace = true }
reqwest = { workspace = true }
anyhow = { workspace = true }
regex = { workspace = true }
rand = { workspace = true }
base64 = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
aes-gcm = { workspace = true }
chacha20poly1305 = { workspace = true }
argon2 = { workspace = true }
pbkdf2 = { workspace = true }
blake3 = { workspace = true }
jsonwebtoken = { workspace = true }
futures = { workspace = true }
schemars = { version = "0.8", features = ["derive"], optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "test-util"] }

[features]
schema = ["schemars"]

[lints]
workspace = true
