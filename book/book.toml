[book]
title = "MockForge Documentation"
authors = ["MockForge Contributors"]
description = "A comprehensive mocking framework for APIs, gRPC, and WebSockets"
language = "en"

[build]
build-dir = "book"
create-missing = true

[output.html]
git-repository-url = "https://github.com/SaaSy-Solutions/mockforge"
edit-url-template = "https://github.com/SaaSy-Solutions/mockforge/edit/main/{path}"
additional-css = ["custom.css"]
additional-js = ["custom.js"]
fold.enable = true
fold.level = 1
smart-punctuation = true
mathjax-support = false

[output.html.search]
enable = true
limit-results = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 2

[output.html.playground]
editable = true
copy-js = true
line-numbers = true

# [output.linkcheck]
# follow-web-links = false
# exclude = [".*github\\.com.*"]
# cache-timeout = 3600

# [preprocessor.toc] disabled: no page uses the <!-- toc --> marker, and
# mdbook-toc 0.15.x fails to parse mdbook 0.4.40+ preprocessor input,
# which broke docs deploys from Nov 2025 onward. Re-enable with a pinned
# version (0.14.2 worked) if a page actually needs a TOC marker.

