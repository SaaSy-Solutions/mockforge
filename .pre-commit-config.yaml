# Pin hooks to the pre-commit stage only. Without this, any hook that doesn't
# declare `stages:` runs at every installed git-hook type. When the commit-msg
# hook is also installed (see `ls .git/hooks/`), that means the full hook set
# (clippy included) runs twice per commit. All hooks below are source-state
# checks, so pre-commit is the only stage that makes sense.
default_stages: [pre-commit]

repos:
- repo: local
  hooks:
  - id: trailing-whitespace
    name: trailing-whitespace
    entry: python3 scripts/precommit/offline_checks.py trailing-whitespace
    language: system
    exclude: ^(book/|crates/mockforge-ui/ui/dist/)
    types: [text]
  - id: end-of-file-fixer
    name: end-of-file-fixer
    entry: python3 scripts/precommit/offline_checks.py end-of-file-fixer
    language: system
    exclude: ^(book/|crates/mockforge-ui/ui/dist/)
    types: [text]
  - id: check-toml
    name: check-toml
    entry: python3 scripts/precommit/offline_checks.py check-toml
    language: system
    files: \.toml$
  - id: check-merge-conflict
    name: check-merge-conflict
    entry: python3 scripts/precommit/offline_checks.py check-merge-conflict
    language: system
    types: [text]
  - id: check-added-large-files
    name: check-added-large-files
    entry: python3 scripts/precommit/offline_checks.py check-added-large-files --maxkb 500
    language: system
    exclude: ^crates/mockforge-ui/ui/dist/
  - id: check-case-conflict
    name: check-case-conflict
    entry: python3 scripts/precommit/offline_checks.py check-case-conflict
    language: system
    pass_filenames: false
  - id: mixed-line-ending
    name: mixed-line-ending
    entry: python3 scripts/precommit/offline_checks.py mixed-line-ending
    language: system
    types: [text]
  - id: check-executables-have-shebangs
    name: check-executables-have-shebangs
    entry: python3 scripts/precommit/offline_checks.py check-executables-have-shebangs
    language: system
  - id: check-shebang-scripts-are-executable
    name: check-shebang-scripts-are-executable
    entry: python3 scripts/precommit/offline_checks.py check-shebang-scripts-are-executable
    language: system
  - id: check-migration-collisions
    name: check-migration-collisions
    # Catches the failure mode that crashed the registry server on 2026-04-30:
    # PR #297 and PR #298 both added migrations at version 20250101000057,
    # neither CI run saw the other, sqlx refused the second on first deploy.
    # Local guard for the same-commit case; CI (.github/workflows/migration-guard.yml)
    # catches the cross-PR race.
    entry: python3 scripts/precommit/check_migration_collisions.py
    language: system
    files: ^crates/[^/]+/migrations/.+\.sql$
  - id: clippy
    name: clippy
    # Scoped clippy — maps changed files to their owning workspace crate via
    # `crates/<name>/...` and runs `cargo clippy -p <crate>` for each affected
    # crate instead of the whole workspace. Falls back to a full --workspace
    # run when a workspace-root file (Cargo.toml/Cargo.lock) changes, when a
    # changed file lives outside crates/<name>/, or when >= 10 crates are
    # affected. Matches the .claude/rules/self-verification.md policy.
    # See `scripts/precommit/clippy_scoped.py` and issue #538.
    entry: python3 scripts/precommit/clippy_scoped.py
    language: system
    pass_filenames: true
    # Only fire on Rust source or Cargo manifest changes. Docs / UI / CI
    # config edits skip clippy entirely, which is the big iteration-speed
    # win (pre-commit clippy was 5-15 min per commit before this).
    files: '(\.rs$|(^|/)Cargo\.toml$|(^|/)Cargo\.lock$)'
    # `cargo check` is intentionally NOT run here. `cargo clippy --all-targets
    # --all-features` is a strict superset of `cargo check --workspace` (clippy
    # type-checks everything check does, plus more targets/features). Running
    # both back-to-back roughly doubles pre-commit time because clippy and check
    # write incompatible metadata into target/ and invalidate each other's
    # incremental cache (rust-lang/cargo#9307).
  - id: typos
    name: typos
    entry: typos
    language: system
    pass_filenames: false
    # Exclusions live in .typos.toml (`[files] extend-exclude`). A pre-commit
    # `exclude:` here has no effect when pass_filenames is false.
  - id: rust-fmt
    name: rust fmt
    entry: cargo fmt --check --all
    language: system
    files: \.(rs)$
    exclude: ^(target/|book/)
    pass_filenames: false
  - id: cargo-audit
    name: cargo audit
    # Wrapper reads ignores from audit.toml (single source of truth). See
    # scripts/precommit/cargo_audit.py and the header of audit.toml.
    entry: python3 scripts/precommit/cargo_audit.py
    language: system
    pass_filenames: false
    files: ^(Cargo\.(toml|lock)|audit\.toml)$
  - id: publish-drift
    name: publish-list drift guard
    # PRE-PUSH ONLY (overrides default_stages: [pre-commit]). Blocks a push when
    # a publishable workspace member is missing from scripts/publish-crates.sh —
    # the #584/#795 failure mode where publish-crates.sh would later fail to
    # resolve a dependency on crates.io. Orphan crates (#796) are warned, not
    # blocked. Mirrors the release-guardian agent so the gate holds even when
    # nobody is driving through Claude. Enable with:
    #   pre-commit install --hook-type pre-push   (scripts/setup-hooks.sh does this)
    entry: scripts/check-publish-drift.sh
    language: system
    stages: [pre-push]
    pass_filenames: false
    always_run: true
