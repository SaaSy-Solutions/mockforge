repos:
- repo: local
  hooks:
  - id: trailing-whitespace
    name: trailing-whitespace
    entry: python3 scripts/precommit/offline_checks.py trailing-whitespace
    language: system
    exclude: ^(book/|crates/mockforge-ui/ui/dist/)
    types: [text]
  - id: end-of-file-fixer
    name: end-of-file-fixer
    entry: python3 scripts/precommit/offline_checks.py end-of-file-fixer
    language: system
    exclude: ^(book/|crates/mockforge-ui/ui/dist/)
    types: [text]
  - id: check-toml
    name: check-toml
    entry: python3 scripts/precommit/offline_checks.py check-toml
    language: system
    files: \.toml$
  - id: check-merge-conflict
    name: check-merge-conflict
    entry: python3 scripts/precommit/offline_checks.py check-merge-conflict
    language: system
    types: [text]
  - id: check-added-large-files
    name: check-added-large-files
    entry: python3 scripts/precommit/offline_checks.py check-added-large-files --maxkb 500
    language: system
    exclude: ^crates/mockforge-ui/ui/dist/
  - id: check-case-conflict
    name: check-case-conflict
    entry: python3 scripts/precommit/offline_checks.py check-case-conflict
    language: system
    pass_filenames: false
  - id: mixed-line-ending
    name: mixed-line-ending
    entry: python3 scripts/precommit/offline_checks.py mixed-line-ending
    language: system
    types: [text]
  - id: check-executables-have-shebangs
    name: check-executables-have-shebangs
    entry: python3 scripts/precommit/offline_checks.py check-executables-have-shebangs
    language: system
  - id: check-shebang-scripts-are-executable
    name: check-shebang-scripts-are-executable
    entry: python3 scripts/precommit/offline_checks.py check-shebang-scripts-are-executable
    language: system
  - id: clippy
    name: clippy
    entry: cargo clippy --all-targets --all-features --workspace --exclude mockforge-desktop
    language: system
    pass_filenames: false
  - id: cargo-check
    name: cargo-check
    entry: cargo check --workspace --exclude mockforge-desktop
    language: system
    pass_filenames: false
  - id: typos
    name: typos
    entry: typos
    language: system
    pass_filenames: false
    exclude: ^(book/|target/|\.git/|crates/mockforge-ui/ui/dist/)
  - id: rust-fmt
    name: rust fmt
    entry: cargo fmt --check --all
    language: system
    files: \.(rs)$
    exclude: ^(target/|book/|crates/mockforge-registry-server/)
    pass_filenames: false
  - id: cargo-audit
    name: cargo audit
    entry: cargo
    # NOTE: this hook bypasses audit.toml and uses its own inline ignore
    # list. Keep the two in sync when adding new acks. Batch additions
    # below (RUSTSEC-2021-0145 through RUSTSEC-2026-0096) are pre-existing
    # advisories acked on 2026-04-09 as part of the cloud-core deploy
    # unblock — not introduced by PR #117. Follow-up security cleanup
    # tracked separately.
    args: [audit,
      --ignore, RUSTSEC-2023-0071,
      --ignore, RUSTSEC-2026-0020,
      --ignore, RUSTSEC-2026-0021,
      --ignore, RUSTSEC-2021-0145,
      --ignore, RUSTSEC-2024-0375,
      --ignore, RUSTSEC-2024-0384,
      --ignore, RUSTSEC-2024-0388,
      --ignore, RUSTSEC-2024-0411,
      --ignore, RUSTSEC-2024-0412,
      --ignore, RUSTSEC-2024-0413,
      --ignore, RUSTSEC-2024-0414,
      --ignore, RUSTSEC-2024-0415,
      --ignore, RUSTSEC-2024-0416,
      --ignore, RUSTSEC-2024-0417,
      --ignore, RUSTSEC-2024-0418,
      --ignore, RUSTSEC-2024-0419,
      --ignore, RUSTSEC-2024-0420,
      --ignore, RUSTSEC-2024-0429,
      --ignore, RUSTSEC-2024-0436,
      --ignore, RUSTSEC-2025-0012,
      --ignore, RUSTSEC-2025-0057,
      --ignore, RUSTSEC-2025-0075,
      --ignore, RUSTSEC-2025-0080,
      --ignore, RUSTSEC-2025-0081,
      --ignore, RUSTSEC-2025-0098,
      --ignore, RUSTSEC-2025-0100,
      --ignore, RUSTSEC-2025-0119,
      --ignore, RUSTSEC-2025-0123,
      --ignore, RUSTSEC-2025-0134,
      --ignore, RUSTSEC-2025-0141,
      --ignore, RUSTSEC-2026-0002,
      --ignore, RUSTSEC-2026-0008,
      --ignore, RUSTSEC-2026-0037,
      --ignore, RUSTSEC-2026-0085,
      --ignore, RUSTSEC-2026-0086,
      --ignore, RUSTSEC-2026-0087,
      --ignore, RUSTSEC-2026-0088,
      --ignore, RUSTSEC-2026-0089,
      --ignore, RUSTSEC-2026-0091,
      --ignore, RUSTSEC-2026-0092,
      --ignore, RUSTSEC-2026-0093,
      --ignore, RUSTSEC-2026-0094,
      --ignore, RUSTSEC-2026-0095,
      --ignore, RUSTSEC-2026-0096]
    language: system
    pass_filenames: false
    files: ^Cargo\.(toml|lock)$
