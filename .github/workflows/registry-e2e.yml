name: Registry E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/mockforge-registry-server/**'
      - 'crates/mockforge-registry-core/**'
      - 'docker-compose.e2e.yml'
      - '.github/workflows/registry-e2e.yml'
  # No `paths:` filter on pull_request — the workflow runs on EVERY PR so the
  # required "Registry E2E (Postgres + MinIO)" check always reports a status.
  # The `changes` job below gates the heavy work: non-registry PRs get a fast
  # skipped job (which branch protection counts as success) instead of a
  # never-reported check that would block the merge. Mirrors ci.yml's pattern.
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Cap cargo parallelism. The self-hosted runner is 8 vCPU shared with
  # 7 other runners; unrestricted `-j` produces flakes under contention.
  # `CARGO_HOME` is set per-job (not here) — it must reference `runner.name`,
  # which the workflow parser only resolves once a runner is assigned.
  CARGO_BUILD_JOBS: "4"
  RUSTUP_TOOLCHAIN: "1.96.0"

concurrency:
  group: registry-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap scope gate on ubuntu-latest (not the busy self-hosted Rust runners).
  # Lets the heavy registry-e2e job below be skipped (= success for branch
  # protection) on PRs that don't touch the registry, so this can be a required
  # check without blocking unrelated PRs. Non-PR events always run the suite.
  changes:
    name: Detect registry scope
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.filter.outputs.registry }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Determine whether registry files changed
        id: filter
        env:
          # Routed through env (not interpolated into the script) per workflow
          # injection best practice. Both are GitHub-controlled values anyway.
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Non-PR event ($EVENT_NAME): running registry E2E."
            echo "registry=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files="$(git diff --name-only "origin/${BASE_REF}...HEAD")"
          echo "Changed files:"; printf '%s\n' "$files"
          registry=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              crates/mockforge-registry-server/*|crates/mockforge-registry-core/*|docker-compose.e2e.yml|.github/workflows/registry-e2e.yml) registry=true ;;
            esac
          done <<< "$files"
          echo "Registry E2E required: registry=$registry"
          echo "registry=$registry" >> "$GITHUB_OUTPUT"

  registry-e2e:
    name: Registry E2E (Postgres + MinIO)
    needs: changes
    if: ${{ needs.changes.outputs.registry == 'true' }}
    runs-on: [self-hosted, linux, x64, rust]
    timeout-minutes: 45

    env:
      # Bound ports on the compose file. Kept non-default so multiple runners on the
      # same host could in principle parallelize by overriding these.
      PG_PORT: "55432"
      MINIO_PORT: "59000"
      REGISTRY_PORT: "58080"

      # Wired into both registry-server and the E2E reqwest clients. No untrusted
      # input flows into these — every value is a literal string controlled by this file.
      DATABASE_URL: "postgres://postgres:password@localhost:55432/mockforge_registry"
      JWT_SECRET: "e2e-jwt-secret-do-not-use-in-prod"
      S3_BUCKET: "mockforge-plugins"
      S3_REGION: "us-east-1"
      S3_ENDPOINT: "http://localhost:59000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      REGISTRY_URL: "http://localhost:58080"
      # Shared bearer token between the registry server and the E2E
      # tests that hit `/api/v1/internal/*`. Kept literal so both
      # processes see the same value.
      MOCKFORGE_INTERNAL_API_TOKEN: "e2e-internal-token-do-not-use-in-prod"
      # paid_flow_e2e signs Stripe webhook events with this secret; the
      # registry server verifies them with the same value. Must match the
      # `DEFAULT_WEBHOOK_SECRET` constant in tests/paid_flow_e2e.rs.
      STRIPE_WEBHOOK_SECRET: "whsec_e2e_test_secret"

      # Lift the rate limiter for E2E. All requests originate from
      # localhost so they share the same `ip:unknown` bucket; the
      # default 60/min global + 100/min per-user is exhausted by the
      # marketplace tests' register -> org -> workspace -> publish -> search
      # chains multiplied across 5 tests serialized by --test-threads=1.
      # The cap is still > test demand by ~3 orders of magnitude, so
      # any genuine runaway loop in a future test will still be caught.
      RATE_LIMIT_PER_MINUTE: "100000"
      RATE_LIMIT_PER_USER: "100000"

    steps:
      - name: Set per-runner CARGO_HOME
        # `runner.name` is unavailable in workflow- or job-level `env:` blocks
        # (GH Actions context: `runner.*` is step-scoped). Writing to
        # `$GITHUB_ENV` here exports it to every subsequent step in this job,
        # including the rust-toolchain composite action and rust-cache.
        run: echo "CARGO_HOME=/tmp/cargo-mockforge-e2e-${{ runner.name }}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: ./.github/actions/rust-toolchain

      - name: Ensure rustup default = 1.96.0
        run: rustup default 1.96.0

      - name: Install protoc
        run: 'dpkg -s protobuf-compiler > /dev/null 2>&1 || { echo "::error::protobuf-compiler missing on self-hosted runner. Run: sudo apt-get install -y protobuf-compiler"; exit 1; }'

      # Same target/ guard as integration-tests.yml — keeps the shared NVMe from
      # filling up across sibling runners.
      - name: Guard target/ size
        run: |
          if [ -d target ] && [ "$(du -sb target | awk '{print $1}')" -gt 32212254720 ]; then
            echo "target/ exceeds 30GB — wiping"
            rm -rf target
          fi

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          env-vars: "CARGO_HOME"

      - name: Build registry-server
        # Debug build (not --release): this is a behavioral E2E lane, not a perf
        # benchmark, so an optimized build buys nothing but costs ~3-5x more CPU
        # time and disk. The runner host is heavily shared; a lighter/faster build
        # is far less likely to be starved or reclaimed mid-job (the lane
        # historically died before the build even finished). Retry once under
        # shared-runner resource pressure, same as the sibling workflow.
        run: |
          cargo build -p mockforge-registry-server \
            || (echo "::warning::first build failed, retrying once" \
                && cargo build -p mockforge-registry-server)

      - name: Start Postgres + MinIO
        run: |
          # Claim a clean slate before `up`. A prior job that was killed/crashed
          # (or never ran `down`) can leave the postgres/minio containers running
          # on the shared self-hosted runner, holding the fixed host ports
          # (:55432, :59000) — `up` then fails with `failed to bind host port …
          # address already in use`. Same #782 leftover-state disease as the
          # registry-server :58080 zombie, one layer down. Best-effort teardown
          # (|| true) so a clean runner isn't affected.
          docker compose -f docker-compose.e2e.yml down --remove-orphans --volumes 2>/dev/null || true
          docker ps -aq --filter "name=mockforge-e2e" | xargs -r docker rm -f 2>/dev/null || true
          docker compose -f docker-compose.e2e.yml up -d
          echo "Waiting for Postgres to be healthy..."
          for i in {1..60}; do
            if docker inspect --format='{{.State.Health.Status}}' mockforge-e2e-db 2>/dev/null | grep -q healthy; then
              echo "Postgres healthy"
              break
            fi
            sleep 1
          done
          echo "Waiting for MinIO to be healthy..."
          for i in {1..60}; do
            if docker inspect --format='{{.State.Health.Status}}' mockforge-e2e-minio 2>/dev/null | grep -q healthy; then
              echo "MinIO healthy"
              break
            fi
            sleep 1
          done
          docker compose -f docker-compose.e2e.yml logs minio-init || true

      - name: Start registry-server (background)
        env:
          # Make sure the server binds to the same port the tests expect.
          PORT: "58080"
          HOST: "0.0.0.0"
          # Pin local artifact storage to a fresh, writable, per-job dir.
          # Without this the server falls back to a RELATIVE ./data/storage
          # (storage.rs:101) inside the persistent self-hosted _work checkout.
          # A prior run can leave ./data/storage owned by another user, so
          # startup create_dir_all(./data/storage) is a no-op success (dir
          # exists) but per-artifact create_dir_all(./data/storage/<kind>/<id>)
          # then fails on permissions — surfacing as marketplace_e2e "Failed to
          # create directory" 500s that block every registry PR. `runner.temp`
          # is cleaned each job. (Must live in this STEP env, not the job-level
          # env block — the `runner` context isn't available there.)
          STORAGE_PATH: "${{ runner.temp }}/mf-e2e-storage"
        run: |
          mkdir -p "$STORAGE_PATH"

          # Free REGISTRY_PORT from any leftover registry-server bound by a
          # PRIOR job on this shared self-hosted runner. This is the #782 root
          # cause: without it the new server fails to bind with EADDRINUSE
          # (`Address already in use (os error 98)`), the health check below
          # then FALSE-PASSES against the stale server, and the E2E tests hit
          # that stale server — which was started without STORAGE_PATH so it
          # writes to ./data/storage and 500s on every marketplace publish.
          # Both calls are best-effort (|| true) so a missing tool never fails.
          fuser -k "${REGISTRY_PORT}/tcp" 2>/dev/null || true
          pkill -f 'target/debug/mockforge-registry-server' 2>/dev/null || true
          sleep 2

          nohup ./target/debug/mockforge-registry-server \
            > registry-server.log 2>&1 &
          SERVER_PID=$!
          echo "$SERVER_PID" > registry-server.pid
          echo "Waiting for registry-server (pid $SERVER_PID) on :${REGISTRY_PORT}..."
          for _ in {1..60}; do
            # If OUR process died (e.g. lost a bind race to a stale server),
            # stop immediately — never let the loop "pass" against someone
            # else's server.
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "::error::registry-server (pid $SERVER_PID) exited during startup — likely failed to bind :${REGISTRY_PORT} (stale server on the runner?)."
              tail -200 registry-server.log || true
              exit 1
            fi
            if curl -sfS "http://localhost:${REGISTRY_PORT}/health" >/dev/null 2>&1; then
              echo "registry-server healthy"
              break
            fi
            sleep 1
          done
          # Final guard: OUR process must still be alive AND the port healthy.
          # The kill -0 check is what distinguishes "our server is serving" from
          # "a stale server answered our curl" (#782).
          if ! kill -0 "$SERVER_PID" 2>/dev/null \
             || ! curl -sfS "http://localhost:${REGISTRY_PORT}/health" >/dev/null 2>&1; then
            echo "::error::registry-server never became healthy (our pid alive: $(kill -0 "$SERVER_PID" 2>/dev/null && echo yes || echo no))"
            tail -200 registry-server.log || true
            exit 1
          fi

      - name: Run E2E tests
        # The three E2E targets each gate on `#[ignore]`. Pass `--ignored` to unlock them.
        # `--test-threads=1` keeps the tests serial; many of them create/delete orgs with
        # generated-but-occasionally-colliding slugs if two run at the same millisecond.
        run: |
          cargo test -p mockforge-registry-server \
            --test workspace_content_e2e \
            --test signup_flow_e2e \
            --test marketplace_e2e \
            --test cloud_verification_e2e \
            --test cloud_ai_contract_diff_e2e \
            --test cloud_conformance_e2e \
            --test paid_flow_e2e \
            -- --ignored --nocapture --test-threads=1

      - name: Dump registry-server log on failure
        if: failure()
        run: |
          echo "===== registry-server.log (tail) ====="
          tail -500 registry-server.log || true

      - name: Stop registry-server
        if: always()
        run: |
          if [ -f registry-server.pid ]; then
            kill "$(cat registry-server.pid)" 2>/dev/null || true
          fi
          # Belt-and-suspenders: also free the port by name/port in case the
          # recorded pid wasn't the process actually bound (a stale leftover).
          # Leaving a server bound here is what poisons the NEXT job (#782).
          fuser -k "${REGISTRY_PORT}/tcp" 2>/dev/null || true
          pkill -f 'target/debug/mockforge-registry-server' 2>/dev/null || true

      - name: Tear down Postgres + MinIO
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: registry-server-log
          path: registry-server.log
          if-no-files-found: ignore
