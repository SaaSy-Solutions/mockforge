name: Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/integration-tests.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Cap cargo parallelism. The self-hosted runner is 8 vCPU shared with
  # 7 other runners; unrestricted `-j` was producing flakes like
  # "could not parse/generate dep info" (file disappearing mid-compile,
  # consistent with rustc being killed under CPU/memory pressure
  # without triggering the OOM-killer log).
  CARGO_BUILD_JOBS: "4"
  # Force rustup to use stable regardless of whatever a sibling repo
  # pinned as the user-level default. `dtolnay/rust-toolchain@stable`
  # installs stable but does not change the default; RUSTUP_TOOLCHAIN
  # overrides the default per invocation, so stale 1.88.0 pins no
  # longer leak into mockforge builds.
  RUSTUP_TOOLCHAIN: stable

# Cancel older still-running pushes to the same ref; a follow-up commit
# shouldn't keep paying for a build we're about to supersede.
concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: [self-hosted, linux, x64, rust]
    # 30 min was tight even on a warm target/. After the target/ size
    # guard wipes at >30GB, cold rebuilds take ~25 min plus test time,
    # which overran the prior limit. 60 min leaves headroom for the
    # occasional cold run without holding the runner hostage.
    timeout-minutes: 60

    steps:
      - name: Set per-runner CARGO_HOME
        # `runner.name` is unavailable in workflow- or job-level `env:` blocks
        # (GH Actions context: `runner.*` is step-scoped). Writing to
        # `$GITHUB_ENV` here exports it to every subsequent step in this job,
        # including the rust-toolchain composite action and rust-cache.
        run: echo "CARGO_HOME=/tmp/cargo-mockforge-${{ runner.name }}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: ./.github/actions/rust-toolchain
        with:
          components: rustfmt, clippy

      # Self-hosted runner is shared with other repos whose workflows can
      # leave rustup's default pinned to some older version (we observed
      # 1.88.0 stuck as default while `stable` had moved on to 1.95.0).
      # `dtolnay/rust-toolchain@stable` ensures stable is installed but
      # does not touch the default — so cargo kept invoking the stale
      # pin. Heal it explicitly.
      - name: Ensure rustup default = stable
        run: rustup default stable

      - name: Install protoc (protobuf compiler)
        run: 'dpkg -s protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev > /dev/null 2>&1 || { echo "::error::Required system deps missing on self-hosted runner. Run on the runner host: sudo apt-get install -y protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev"; exit 1; }'

      # Self-hosted runner has persistent disk shared across multiple
      # runners; target/ can balloon past 60GB between jobs and fill the
      # 150GB NVMe (five other SaaS runners live on the same box). If
      # target/ has grown past 30GB, wipe it — cheaper than disk-full.
      - name: Guard target/ size on self-hosted runner
        run: |
          if [ -d target ] && [ "$(du -sb target | awk '{print $1}')" -gt 32212254720 ]; then
            echo "target/ exceeds 30GB — wiping to avoid disk-full on shared runner"
            rm -rf target
          fi

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          env-vars: "CARGO_HOME"

      - name: Build MockForge binary (needed for integration tests)
        # Retry once on transient "No such file or directory" / SIGKILL
        # style failures from rustc under resource contention on the
        # shared self-hosted runner. Incremental artifacts from the first
        # attempt let the retry pick up where it left off cheaply.
        run: |
          cargo build --bin mockforge --release --features all-protocols \
            || (echo "::warning::first build failed, retrying once" \
                && cargo build --bin mockforge --release --features all-protocols)

      - name: Verify binary exists
        run: |
          if [ -f "target/release/mockforge" ]; then
            echo "✅ Binary built successfully"
            ./target/release/mockforge --version || true
          else
            echo "❌ Binary not found!"
            exit 1
          fi

      # GHA does not expand $PATH inside an `env:` value (it's a literal
      # string), so the previous `env: PATH: ...:$PATH` was wiping cargo
      # and everything else from PATH. Use GITHUB_PATH, which the runner
      # evaluates per-step, to prepend safely. Some ignored tests shell
      # out to `mockforge` so keep the binary discoverable on PATH.
      - name: Prepend target/release to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"

      # We intentionally do NOT pass `--ignored` here. The ~50 ignored
      # tests across this crate split into categories that CI is not set
      # up to run: they require a separately-running server, external
      # language toolchains (Node/Python/Go/Java/.NET), real credentials
      # for OpenAI (MockAI tests), or are timing-sensitive or long-running.
      # The earlier `--ignored` run failed 97 consecutive times — two
      # mockai_integration tests exited first with "OpenAI API key not
      # found" and cargo fail-fast bailed before the rest could surface
      # their own infra gaps. Run these locally when testing a specific
      # integration. The non-ignored suite is the real CI coverage.
      #
      # `--skip protocols::` excludes the e2e protocol tests from THIS
      # step — they spawn real mockforge processes that race on ports
      # under parallel test execution (find_available_port TOCTOU).
      # The E2E phase later in this job runs them with --test-threads=1.
      - name: Run integration tests (non-ignored)
        run: |
          cargo test --package mockforge-integration-tests --test '*' -- --nocapture --skip 'protocols::'

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: |
            target/test-results/
          if-no-files-found: ignore
          retention-days: 7

      # --- E2E phase (formerly a separate `e2e-tests` job) -------------------
      # Merged into this job so the release binary built above is reused
      # directly — the old split paid a second queue slot on the saturated
      # single-slot self-hosted runner plus duplicate checkout/toolchain/protoc
      # setup, and relied on the second job landing on the SAME physical runner
      # to find target/ warm. As steps in one job this is strictly serial (the
      # original reason for the split was to avoid parallel rustc on a shared
      # runner — `needs:` ordering, now subsumed) and the binary is guaranteed
      # warm: no rebuild step at all.
      #
      # E2E runs only on PRs and main (the former job's `if:` gate) — skipped
      # on develop pushes and manual dispatch.
      - name: Run E2E tests
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        # Target the `e2e` integration-test binary (tests/tests/e2e.rs) and
        # filter to each protocol module. The prior form
        # `... -- e2e::protocols::<foo>` ran against every test binary and
        # filtered by a `e2e::`-prefixed path that doesn't exist (the test
        # paths inside the e2e binary are `protocols::<foo>::...`), so every
        # binary filtered to 0 and the job reported vacuously green.
        #
        # `--test-threads=1` because `mockforge-test::find_available_port`
        # has a pre-existing TOCTOU race: parallel tests all see port 31000
        # as free and then race to bind it. Serial execution side-steps it.
        run: |
          cargo test --package mockforge-integration-tests --release --test e2e -- --test-threads=1 protocols::http_e2e_tests
          cargo test --package mockforge-integration-tests --release --test e2e -- --test-threads=1 protocols::websocket_e2e_tests
          cargo test --package mockforge-integration-tests --release --test e2e -- --test-threads=1 protocols::grpc_e2e_tests

      - name: Upload E2E test results
        if: failure() && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: target/test-results/
          retention-days: 7
