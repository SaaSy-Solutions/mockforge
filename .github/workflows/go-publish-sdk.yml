name: Publish mockforge/sdk/go to pkg.go.dev

# Go modules don't push to a registry the way npm/PyPI do — proxy.golang.org
# picks up modules on tag push. This workflow does the few things we still
# need to wire on tag:
#
#   1. Validate `sdk/go/go.mod` builds + tests pass at the tagged commit.
#   2. Warm the module proxy so `go get` sees the new version immediately
#      instead of waiting for the next idle scan (typical lag: minutes).
#   3. Surface failures in a single workflow status check so the rest of
#      the SDK publish workflows look uniform.
#
# Triggers:
#   1. `workflow_dispatch` — manual run.
#   2. `push` on a tag matching `sdk/go/v*` (e.g. `sdk/go/v0.1.0`).
#
# IMPORTANT — tag scheme: this module lives in a subdirectory
# (github.com/SaaSy-Solutions/mockforge/sdk/go), so Go's module-versioning
# rules require the version tag to be the subdir path + semver, i.e.
# `sdk/go/v0.1.0`. The previous `go-sdk-v*` scheme could NEVER make the module
# installable — `go get .../sdk/go@v0.1.0` only resolves a `sdk/go/v0.1.0` tag.
# That is why the module had never published despite this workflow existing.
#
# Prereqs: none — the warm-up uses anonymous proxy.golang.org access.

on:
  push:
    tags:
      - 'sdk/go/v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Vet
        # `-unsafeptr=false` disables ONLY the unsafeptr analyzer. The WASM
        # plugin sub-package (mockforge/plugin.go) reads guest WASM linear
        # memory via the canonical `unsafe.Slice((*byte)(unsafe.Pointer(
        # uintptr(ptr))), n)` ABI pattern — `ptr` is a memory offset, not a Go
        # heap pointer, so the unsafeptr warning is a false positive that can't
        # be fixed without breaking the ABI. Every other analyzer stays on
        # (one of them is what caught a misplaced //go:build directive here).
        run: go vet -unsafeptr=false ./...

      - name: Test
        # Real gate now (no failure-swallowing): the unit suite compiles and
        # passes on default tags; integration tests are behind `-tags=integration`.
        run: go test ./...

      - name: Warm proxy.golang.org
        env:
          GH_REF: ${{ github.ref }}
        run: |
          # Tag name comes off the ref, not interpolated directly into the
          # shell — keeps us off the workflow-injection list even though a
          # git tag is technically attacker-influenced.
          tag="${GH_REF#refs/tags/}"
          if [ -z "$tag" ] || [ "$tag" = "$GH_REF" ]; then
            echo "manual run — skipping proxy warm-up"
            exit 0
          fi
          # Tag is `sdk/go/v0.1.0`; the proxy version query is the semver part.
          vtag="${tag#sdk/go/}"   # -> v0.1.0
          # Module-path escaping for the proxy: each uppercase letter becomes
          # `!<lower>`, so github.com/SaaSy-Solutions/... escapes to
          # github.com/!saa!sy-!solutions/... (NOT %21 percent-encoding, and
          # not lower-casing — the canonical path must match go.mod's casing).
          curl -fsS "https://proxy.golang.org/github.com/!saa!sy-!solutions/mockforge/sdk/go/@v/${vtag}.info" \
            || echo "::warning::proxy warm-up failed; module will still index on next proxy scan"
