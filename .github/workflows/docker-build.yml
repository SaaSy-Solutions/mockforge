name: Docker Build and Push

on:
  # Main pushes + tags still build the full image — that's what ends up in
  # GHCR and what `docker pull ghcr.io/saasy-solutions/mockforge` serves. The
  # broad `crates/**` path is correct there because any code change affects
  # the final binary that's shipped.
  push:
    branches: [main, develop]
    tags:
      - 'v*'
    paths:
      - 'Cargo.*'
      - 'crates/**'
      - 'Dockerfile*'
      - '.dockerignore'
      - '.github/workflows/docker-build.yml'
  # PR trigger narrowed: per-PR builds are only useful to catch Dockerfile
  # regressions — code-only PRs don't need a 5-8 min image rebuild, since
  # main-push re-builds the image before it reaches users anyway.
  pull_request:
    branches: [main, develop]
    paths:
      - 'Dockerfile*'
      - '.dockerignore'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

# Push-on-main retained — publishes the GHCR image. Concurrency keys are
# GitHub-internal context (not user-supplied), safe to interpolate.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  # Must be lowercase for Docker image references
  IMAGE_NAME: saasy-solutions/mockforge

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: [self-hosted, linux, x64, rust]
    # Skip drafts to avoid burning minutes on in-progress PRs
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    permissions:
      contents: read
      packages: write
      id-token: write  # For OIDC token
      security-events: write  # For Trivy scan results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-,format=long,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64-only. Multi-arch via QEMU was adding ~5h per build
          # (cost driver, per Apr 2026 usage audit). Re-add linux/arm64 here
          # if/when we actually ship to arm64 targets (Graviton, Apple Silicon
          # native, Raspberry Pi). Consider gating arm64 on tag releases only.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.created }}

      - name: Run Trivy vulnerability scanner
        id: trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: github.event_name != 'pull_request' && steps.trivy.outcome == 'success'
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.json

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: sbom
          path: sbom.json

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign container image with Cosign
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_DIGEST: ${{ steps.build-and-push.outputs.digest }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          cosign sign --yes "${IMAGE_REF}@${IMAGE_DIGEST}"

      # Self-hosted runner keeps its disk between jobs, so prune old
      # Docker artifacts every run to keep storage from growing forever.
      # Keeps Buildx cache (that's gated by cache-to=type=gha).
      - name: Prune Docker artifacts older than 7 days
        if: always()
        run: docker system prune -af --filter "until=168h" || true

  scan-and-analyze:
    name: Security Scan and Analysis
    needs: build-and-push
    runs-on: [self-hosted, linux, x64, rust]
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write

    steps:
      # Advisory only. Trivy (in build-and-push) already uploads
      # CRITICAL/HIGH SARIF to the Security tab; Grype is here as a
      # second-opinion scanner, but should not gate the pipeline — a
      # HIGH CVE in a base image (glibc, openssl) is typically not
      # actionable same-day and would otherwise red every main run.
      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v3
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          fail-build: false
          severity-cutoff: high

      # Advisory only. Dockle at --exit-level=warn fails on benign
      # findings (e.g. CIS-DI-0001 for missing explicit USER) — useful
      # as signal, not as a gate.
      - name: Run Dockle security linter
        continue-on-error: true
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:latest \
            --exit-level fatal \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # Removed: the old `update-deployment` job that auto-committed image
  # tag bumps to k8s/deployment.yaml and helm/mockforge/values.yaml. It
  # had zero successful runs since Feb 2026 — the default GITHUB_TOKEN
  # cannot push to protected main, and the sed rewrite fought with the
  # pinned tags the manifests carry. For GitOps-style image bumps, open
  # a PR via peter-evans/create-pull-request or use an external image
  # automation controller (Flux, ArgoCD Image Updater).
