name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Serialize releases — never abort an in-flight release mid-publish.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_CACHE_SIZE: "2G"
      CARGO_INCREMENTAL: "0"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev

    - name: Setup sccache (GHA backend)
      id: sccache
      uses: mozilla-actions/sccache-action@v0.0.10
      continue-on-error: true

    - name: Verify sccache works
      id: sccache-check
      run: |
        if sccache --start-server 2>/dev/null && sccache rustc -vV 2>/dev/null; then
          echo "sccache_available=true" >> "$GITHUB_OUTPUT"
          echo "::notice::sccache is available - using cached compilation"
        else
          echo "sccache_available=false" >> "$GITHUB_OUTPUT"
          echo "::warning::sccache unavailable (GHA cache service may be down) - building without cache"
          sccache --stop-server 2>/dev/null || true
        fi
      continue-on-error: true

    - name: Configure RUSTC_WRAPPER
      env:
        SCCACHE_OK: ${{ steps.sccache-check.outputs.sccache_available }}
      run: |
        if [ "$SCCACHE_OK" = "true" ]; then
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
        else
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
        fi

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    # mockforge-cli's default features do NOT include `ws`/`grpc`/`mqtt` (see
    # crates/mockforge-cli/Cargo.toml). The mockforge-integration-tests crate
    # spawns this binary as a subprocess for e2e tests and tries to connect
    # to the WS / gRPC ports — without the protocol features compiled in,
    # nothing is listening and the tests fail with `Connection refused`.
    # The cross-platform-test job in ci.yml had this same step (added in
    # PR #208) but it was never replicated here, so every release tag has
    # been red on the `Run tests` step. The pre-built debug binary takes
    # precedence in mockforge-test's binary-resolution order, which is why
    # building it here (as `dev` profile) before `cargo test --release`
    # is the right shape.
    - name: Build mockforge binary with all protocols
      run: cargo build --bin mockforge --features all-protocols

    - name: Run tests
      run: cargo test --workspace --release
    - name: Build release binaries
      run: cargo build --workspace --release
    - name: sccache stats
      if: always()
      run: sccache --show-stats 2>/dev/null || echo "sccache was not used in this run"

    - name: Generate changelog
      id: changelog
      env:
        REF_NAME: ${{ github.ref_name }}
        REPO: ${{ github.repository }}
      run: |
        # Generate changelog from git tags
        echo "## What's Changed" >> changelog.md
        echo "" >> changelog.md

        # Get commits since last tag
        if git describe --tags --abbrev=0 HEAD^ 2>/dev/null; then
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^)
          git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..HEAD >> changelog.md
        else
          git log --pretty=format:"- %s (%h)" >> changelog.md
        fi

        echo "" >> changelog.md
        echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREVIOUS_TAG}...${REF_NAME}" >> changelog.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body_path: changelog.md
        draft: false
        prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: '!contains(github.ref_name, ''rc'') && !contains(github.ref_name, ''alpha'') && !contains(github.ref_name, ''beta'')'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Publish crates
      # Delegates to scripts/publish-crates.sh, which:
      #   - iterates workspace crates in topologically-sorted dep order,
      #   - adds `version = ".."` to path deps so cargo publish accepts
      #     them (crates.io rejects path-only deps),
      #   - flips `publish = false` -> true for internal crates pulled in
      #     transitively (e.g. mockforge-registry-core),
      #   - parses the `Retry-After` value on crates.io 429s and sleeps
      #     before retrying instead of silently dropping the publish,
      #   - polls crates.io until each new version is actually indexed
      #     before publishing dependents.
      # One source of truth for both CI and local "release-from-laptop" flows.
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      run: |
        chmod +x scripts/publish-crates.sh
        scripts/publish-crates.sh

  # Docker image publishing lives in .github/workflows/docker-build.yml
  # (multi-arch push to ghcr.io/saasy-solutions/mockforge on every push to
  # main and on semver tags). GHCR is the canonical registry for MockForge
  # images; we do not publish to Docker Hub.

  deploy-registry:
    name: Deploy Registry Server to Fly.io
    runs-on: ubuntu-latest
    if: '!contains(github.ref_name, ''rc'') && !contains(github.ref_name, ''alpha'') && !contains(github.ref_name, ''beta'')'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install flyctl
      uses: superfly/flyctl-actions/setup-flyctl@master

    - name: Deploy registry server
      run: flyctl deploy --config fly.registry.toml --remote-only
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  helm:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    if: '!contains(github.ref_name, ''rc'') && !contains(github.ref_name, ''alpha'') && !contains(github.ref_name, ''beta'')'
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: '3.13.0'

    - name: Extract version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Update Helm chart version and appVersion
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        sed -i "s/^version:.*/version: $VERSION/" helm/mockforge/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" helm/mockforge/Chart.yaml

        echo "Updated Chart.yaml:"
        cat helm/mockforge/Chart.yaml

    - name: Lint Helm chart
      run: |
        helm lint helm/mockforge

    - name: Package Helm chart
      run: |
        mkdir -p .helm-release
        helm package helm/mockforge --destination .helm-release
        echo "Packaged charts:"
        ls -la .helm-release/

    - name: Generate Helm repository index
      env:
        REPO: ${{ github.repository }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        cd .helm-release
        helm repo index . --url "https://github.com/${REPO}/releases/download/${REF_NAME}"

    - name: Upload Helm chart to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          .helm-release/*.tgz
          .helm-release/index.yaml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Checkout or create gh-pages branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin gh-pages:gh-pages 2>/dev/null || true
        if git rev-parse --verify gh-pages 2>/dev/null; then
          git worktree add gh-pages gh-pages
        else
          git worktree add --detach gh-pages
          cd gh-pages
          git checkout --orphan gh-pages
          git rm -rf . 2>/dev/null || true
          git commit --allow-empty -m "Initialize gh-pages branch"
        fi

    - name: Update Helm repository on GitHub Pages
      env:
        OWNER: ${{ github.repository_owner }}
      run: |
        # Copy packaged chart to gh-pages
        mkdir -p gh-pages/charts
        cp .helm-release/*.tgz gh-pages/charts/

        # Generate index for all charts
        cd gh-pages
        helm repo index charts --url "https://${OWNER}.github.io/mockforge/charts" --merge charts/index.yaml || helm repo index charts --url "https://${OWNER}.github.io/mockforge/charts"

        # Create README if it doesn't exist
        if [ ! -f charts/README.md ]; then
          cat > charts/README.md <<EOF
        # MockForge Helm Chart Repository

        ## Usage

        Add the repository:
        \`\`\`bash
        helm repo add mockforge https://${OWNER}.github.io/mockforge/charts
        helm repo update
        \`\`\`

        Install MockForge:
        \`\`\`bash
        helm install mockforge mockforge/mockforge
        \`\`\`

        ## Available Charts

        - **mockforge**: Main application chart

        ## Documentation

        For full documentation, visit: https://mockforge.dev
        EOF
        fi

    - name: Commit and push to gh-pages
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        cd gh-pages
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add charts/
        git commit -m "Release Helm chart version $VERSION" || echo "No changes to commit"
        git push origin gh-pages || echo "No changes to push"
