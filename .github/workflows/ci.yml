name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_BUILD_JOBS: "4"
  RUSTUP_TOOLCHAIN: "1.96.0"
  # Reality level for mock testing (1-5, default: 3)
  # 1 = Static Stubs, 2 = Light Simulation, 3 = Moderate Realism,
  # 4 = High Realism, 5 = Production Chaos
  MOCKFORGE_REALITY_LEVEL: 3
  # Allow in-memory auth for integration tests (cfg!(test) is false in integration tests)
  MOCKFORGE_ALLOW_INMEMORY_AUTH: "true"
  MOCKFORGE_ENABLE_DEV_AUTH: "true"
  ENVIRONMENT: "development"

jobs:
  # Lightweight gate: decide whether this PR touches anything other than docs
  # (book/**, docs/**, *.md) or agent config (.claude/**). The heavy Rust + UI
  # jobs `needs: changes` and run only when `code == 'true'`. Non-PR events
  # (push to main, tags, dispatch) always set code=true, so main stays fully
  # tested and release builds are never skipped. Runs on ubuntu-latest so this
  # gate is not queued behind the busy self-hosted Rust runners. A skipped
  # required check counts as success for branch protection, so docs-only PRs
  # stay mergeable without burning self-hosted runner time on a full Rust build.
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Determine whether non-docs files changed
        id: filter
        env:
          # Routed through env (not interpolated into the script) per workflow
          # injection best practice. Both are GitHub-controlled values anyway.
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Non-PR event ($EVENT_NAME): running full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files="$(git diff --name-only "origin/${BASE_REF}...HEAD")"
          echo "Changed files:"; printf '%s\n' "$files"
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              book/*|docs/*|.claude/*|*.md) ;;   # docs / agent config: skip heavy CI
              *) code=true ;;                     # anything else counts as code
            esac
          done <<< "$files"
          echo "Heavy CI required: code=$code"
          echo "code=$code" >> "$GITHUB_OUTPUT"

  # Only stable runs per-PR. Beta/nightly produced constant noise (rustc churn,
  # not real regressions) and each PR was spending ~3x the self-hosted queue time
  # for a signal nobody acted on. If we ever want beta/nightly visibility again,
  # add a scheduled workflow (e.g. weekly) rather than per-PR.
  test:
    name: Test
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: [self-hosted, linux, x64, rust]
    env:
      CARGO_INCREMENTAL: "0"
    strategy:
      fail-fast: false
      matrix:
        rust:
          - "1.96.0"

    steps:
    - name: Set per-runner CARGO_HOME
      # `runner.name` is unavailable in workflow- or job-level `env:` blocks
      # (GH Actions context: `runner.*` is step-scoped). Writing to
      # `$GITHUB_ENV` here exports it to every subsequent step in this job,
      # including the rust-toolchain composite action and rust-cache.
      run: echo "CARGO_HOME=/tmp/cargo-mockforge-${{ runner.name }}" >> "$GITHUB_ENV"

    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: ./.github/actions/rust-toolchain
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Install system dependencies
      run: 'dpkg -s protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev > /dev/null 2>&1 || { echo "::error::Required system deps missing on self-hosted runner. Run on the runner host: sudo apt-get install -y protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev"; exit 1; }'

    # sccache was here, removed 2026-05-06: 0% Rust hit rate over 1378+
    # compile attempts. Self-hosted runners' rustc invocations include
    # absolute paths to /home/actions/actions-runner-{N}/_work/.../target/
    # in --extern args, so cache keys differ across the 9 sibling runners.
    # Swatinem/rust-cache@v2 below covers the same use case (target/ caching).
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        env-vars: "CARGO_HOME"

    - name: Check formatting
      run: cargo fmt --all -- --check
      if: matrix.rust == '1.96.0'

    # `-D unused_qualifications` mirrors the workspace-wide ratchet in
    # scripts/lint-warning-gate.sh, but surfaces it here in the main
    # clippy step so qualifier drift hits the same row in the PR-checks
    # UI as the standard correctness lints. The dedicated warning-gate
    # job has been historically ignored when red; pulling the check into
    # the main clippy line makes it much harder to merge over.
    # The dedicated gate stays as defense-in-depth.
    # Static command — no untrusted input is interpolated.
    - name: Run clippy
      run: cargo clippy --workspace --exclude mockforge-desktop --lib --bins --all-features -- -D clippy::correctness -D unused_qualifications
      if: matrix.rust == '1.96.0'

    - name: Build workspace
      run: cargo build --workspace --exclude mockforge-desktop --verbose

    # mockforge-cli's default features do NOT include `ws`/`grpc`/`mqtt` etc.
    # The integration tests in `tests/tests/e2e/protocols/*` spawn the
    # workspace's `mockforge` binary as a subprocess and connect to the
    # per-protocol port. Without those features compiled in nothing is
    # listening and the tests fail with `Connection refused`.
    #
    # We build the all-protocols binary and stash a copy OUTSIDE target/.
    # Building into target/debug/mockforge is not enough: the `Run tests`
    # step below runs `cargo test --workspace`, which re-builds the
    # mockforge bin with mockforge-cli's DEFAULT (ws-less) features —
    # cargo's fingerprint is feature-aware, so it deterministically
    # recompiles and overwrites target/debug/mockforge at the same path
    # before any test runs. The stashed copy survives that rebuild, and
    # `MOCKFORGE_TEST_BINARY` (honored by mockforge-test's binary resolver
    # ahead of target/debug) points the e2e subprocess tests at it.
    # $RUNNER_TEMP is per-runner, so sibling runners on this host don't
    # collide. No untrusted input in either step.
    - name: Build mockforge binary with all protocols (for e2e tests)
      run: |
        cargo build --bin mockforge --features all-protocols
        cp target/debug/mockforge "$RUNNER_TEMP/mockforge-all-protocols"

    - name: Run tests
      run: cargo test --workspace --exclude mockforge-desktop --verbose
      env:
        MOCKFORGE_TEST_BINARY: ${{ runner.temp }}/mockforge-all-protocols

    - name: Run tests with all features
      run: cargo test --workspace --exclude mockforge-desktop --exclude mockforge-tui --all-features --verbose
      if: matrix.rust == '1.96.0'
      continue-on-error: true  # May fail if native libs (vosk) not installed

    - name: Check documentation
      run: cargo doc --workspace --exclude mockforge-desktop --no-deps
      if: matrix.rust == '1.96.0'

  ui-test:
    name: UI Tests
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: [self-hosted, linux, x64, rust]

    steps:
      - name: Set per-runner CARGO_HOME
        # `runner.name` is unavailable in workflow- or job-level `env:` blocks
        # (GH Actions context: `runner.*` is step-scoped). Writing to
        # `$GITHUB_ENV` here exports it to every subsequent step in this job,
        # including the rust-toolchain composite action and rust-cache.
        run: echo "CARGO_HOME=/tmp/cargo-mockforge-${{ runner.name }}" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        working-directory: crates/mockforge-ui/ui
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: crates/mockforge-ui/ui
        run: pnpm type-check

      - name: Lint
        working-directory: crates/mockforge-ui/ui
        run: pnpm lint

      - name: Build UI
        working-directory: crates/mockforge-ui/ui
        run: pnpm build

      - name: Run tests
        working-directory: crates/mockforge-ui/ui
        run: pnpm test

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          directory: crates/mockforge-ui/ui/coverage
          flags: ui-tests

  # Cross-Platform Tests (macos-latest + windows-latest) removed: the job had
  # been chronically red on main for weeks (see MEMORY.md:
  # project_broken_ci_state.md). Each PR burned GHA-hosted macOS and Windows
  # minutes — the most expensive tier — to produce a failure nobody acted on.
  # When cross-platform coverage is wanted back, add a dedicated workflow
  # with `on: schedule:` weekly + `workflow_dispatch:` rather than per-PR.

  warning-gate:
    name: Incremental Warning Gate
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: [self-hosted, linux, x64, rust]
    env:
      CARGO_INCREMENTAL: "0"
    steps:
    - name: Set per-runner CARGO_HOME
      # `runner.name` is unavailable in workflow- or job-level `env:` blocks
      # (GH Actions context: `runner.*` is step-scoped). Writing to
      # `$GITHUB_ENV` here exports it to every subsequent step in this job,
      # including the rust-toolchain composite action and rust-cache.
      run: echo "CARGO_HOME=/tmp/cargo-mockforge-${{ runner.name }}" >> "$GITHUB_ENV"

    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: ./.github/actions/rust-toolchain

    - name: Install protoc (protobuf compiler)
      run: 'dpkg -s protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev > /dev/null 2>&1 || { echo "::error::Required system deps missing on self-hosted runner. Run on the runner host: sudo apt-get install -y protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev"; exit 1; }'

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        env-vars: "CARGO_HOME"

    - name: Run warning gate
      run: bash scripts/lint-warning-gate.sh

  warning-ratchet-preview:
    name: Warning Ratchet Preview
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: [self-hosted, linux, x64, rust]
    continue-on-error: true
    env:
      CARGO_INCREMENTAL: "0"
    steps:
    - name: Set per-runner CARGO_HOME
      # `runner.name` is unavailable in workflow- or job-level `env:` blocks
      # (GH Actions context: `runner.*` is step-scoped). Writing to
      # `$GITHUB_ENV` here exports it to every subsequent step in this job,
      # including the rust-toolchain composite action and rust-cache.
      run: echo "CARGO_HOME=/tmp/cargo-mockforge-${{ runner.name }}" >> "$GITHUB_ENV"

    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: ./.github/actions/rust-toolchain

    - name: Install protoc (protobuf compiler)
      run: 'dpkg -s protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev > /dev/null 2>&1 || { echo "::error::Required system deps missing on self-hosted runner. Run on the runner host: sudo apt-get install -y protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev"; exit 1; }'

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        env-vars: "CARGO_HOME"

    - name: Run ratchet preview
      run: bash scripts/lint-warning-ratchet-preview.sh

  security-audit:
    name: Security Audit
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: [self-hosted, linux, x64, rust]
    steps:
    - name: Set per-runner CARGO_HOME
      # `runner.name` is unavailable in workflow- or job-level `env:` blocks
      # (GH Actions context: `runner.*` is step-scoped). Writing to
      # `$GITHUB_ENV` here exports it to every subsequent step in this job,
      # including the rust-toolchain composite action and rust-cache.
      run: echo "CARGO_HOME=/tmp/cargo-mockforge-${{ runner.name }}" >> "$GITHUB_ENV"

    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: ./.github/actions/rust-toolchain

    - name: Install protoc (protobuf compiler)
      run: 'dpkg -s protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev > /dev/null 2>&1 || { echo "::error::Required system deps missing on self-hosted runner. Run on the runner host: sudo apt-get install -y protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev"; exit 1; }'
    - name: Verify security tools present on self-hosted runner
      # `cargo install` rebuilds these from source on every run (~5 min total),
      # which dominated Security Audit wall-clock. Both tools change rarely;
      # we preinstall them on the runner and verify here with the same
      # pattern used for protoc above.
      #
      # IMPORTANT (#539): the durable install location is `/usr/local/bin/`,
      # NOT `~/.cargo/bin/`. The `actions/rust-toolchain` setup re-runs
      # `rustup-init` on each workflow, which wipes `/home/actions/.cargo/bin/`
      # — so anything installed there with `cargo install` survives only until
      # the next toolchain bump. `/usr/local/bin/` is root-owned, comes earlier
      # in $PATH for the runner user, and is untouched by rustup-init.
      #
      # To repair a missing tool, SSH the runner and copy the binary into the
      # durable location (binaries are statically linked, no rebuild needed):
      #   ssh root@<runner-ip>
      #   cp /home/actions/.cargo/bin/cargo-audit /usr/local/bin/
      #   cp /home/actions/.cargo/bin/cargo-deny  /usr/local/bin/
      # If `~/.cargo/bin/` is empty too, first build the tool once with
      # `sudo -u actions cargo install <tool> --locked --force`, then copy.
      # Long-term: runner provisioning in the saas-platform repo
      # (`infrastructure/github-runners/`) should populate /usr/local/bin/
      # directly.
      run: |
        durable_repair_msg='Repair: ssh the runner and run `cp /home/actions/.cargo/bin/<tool> /usr/local/bin/` (cargo install into ~/.cargo/bin/ alone will be wiped by the next rustup-init run — see ci.yml comment).'
        command -v cargo-audit > /dev/null || { echo "::error::cargo-audit missing on self-hosted runner. $durable_repair_msg"; exit 1; }
        command -v cargo-deny  > /dev/null || { echo "::error::cargo-deny missing on self-hosted runner. $durable_repair_msg"; exit 1; }
        # Surface which copy is on PATH so a future failure makes the
        # ~/.cargo/bin vs /usr/local/bin distinction obvious in logs.
        echo "cargo-audit: $(command -v cargo-audit)"
        echo "cargo-deny:  $(command -v cargo-deny)"
        cargo-audit --version
        cargo-deny --version

    - name: Run RustSec advisory scan
      # Delegate to scripts/precommit/cargo_audit.py so audit.toml is the
      # single source of truth for ignored advisories (the cargo-audit CLI
      # has no native config-file support). Keeps CI in sync with the
      # pre-commit hook.
      run: python3 scripts/precommit/cargo_audit.py

    - name: Run license and source compliance check
      run: cargo deny check licenses sources bans

    # The previous `cargo clippy --workspace --all-features ... || true` step
    # used to live here. It ran for 3-5 minutes per CI run but always exited
    # 0 because of the trailing `|| true`, so it never blocked anything and
    # nobody acted on its output. Regular workspace clippy (in the `Test
    # (stable)` job) already covers the same surface. Removed — see
    # `[[reference_security_audit_perf]]`.

    - name: Check for unsafe code blocks
      run: |
        echo "Files containing 'unsafe' blocks:"
        find crates -name "*.rs" -type f -exec grep -l "unsafe" {} \; | sort || echo "None found"

  coverage:
    name: Code Coverage
    runs-on: [self-hosted, linux, x64, rust]
    # Coverage only runs on main pushes — per-PR runs took a full workspace
    # rebuild with llvm-cov instrumentation (~15 min on a warm runner) for a
    # signal that was never acted on at PR-review time. Codecov tracks the
    # trend on main; if a PR needs per-branch coverage, use workflow_dispatch.
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
    - name: Set per-runner CARGO_HOME
      # `runner.name` is unavailable in workflow- or job-level `env:` blocks
      # (GH Actions context: `runner.*` is step-scoped). Writing to
      # `$GITHUB_ENV` here exports it to every subsequent step in this job,
      # including the rust-toolchain composite action and rust-cache.
      run: echo "CARGO_HOME=/tmp/cargo-mockforge-${{ runner.name }}" >> "$GITHUB_ENV"

    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: ./.github/actions/rust-toolchain
      with:
        components: llvm-tools-preview

    - name: Install protoc (protobuf compiler)
      run: 'dpkg -s protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev > /dev/null 2>&1 || { echo "::error::Required system deps missing on self-hosted runner. Run on the runner host: sudo apt-get install -y protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev"; exit 1; }'
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        env-vars: "CARGO_HOME"

    - name: Generate coverage report
      run: cargo llvm-cov --workspace --exclude mockforge-desktop --lcov --output-path lcov.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: lcov.info
        fail_ci_if_error: false

  msrv:
    name: Minimum Supported Rust Version
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: [self-hosted, linux, x64, rust]
    env:
      CARGO_INCREMENTAL: "0"
    steps:
    - name: Set per-runner CARGO_HOME
      # `runner.name` is unavailable in workflow- or job-level `env:` blocks
      # (GH Actions context: `runner.*` is step-scoped). Writing to
      # `$GITHUB_ENV` here exports it to every subsequent step in this job,
      # including the rust-toolchain composite action and rust-cache.
      run: echo "CARGO_HOME=/tmp/cargo-mockforge-${{ runner.name }}" >> "$GITHUB_ENV"

    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Rust toolchain (MSRV)
      uses: ./.github/actions/rust-toolchain
      with:
        toolchain: "1.91"  # MSRV - matches highest requirement from dependencies (aws-sdk, async-graphql, time)

    - name: Install protoc (protobuf compiler)
      run: 'dpkg -s protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev > /dev/null 2>&1 || { echo "::error::Required system deps missing on self-hosted runner. Run on the runner host: sudo apt-get install -y protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev"; exit 1; }'

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        env-vars: "CARGO_HOME"

    - name: Check MSRV compatibility
      run: |
        # MSRV 1.91 supports edition2024 and all current dependency requirements
        cargo check --workspace

  typos:
    name: Spell Check
    # GitHub-hosted: a pure text check needs no Rust toolchain, and the repo is
    # public so standard runners are free. Keeps the contended self-hosted Rust
    # slot for jobs that actually compile. (No per-runner CARGO_HOME needed.)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Check typos
      uses: crate-ci/typos@master

  changelog-validation:
    name: Changelog Validation
    # GitHub-hosted: a git-diff + shell check needs no Rust toolchain; public
    # repo → free standard runner, and it frees the self-hosted Rust slot.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Validate changelog pillar tags
      # base_ref is the PR target branch name; route it through env rather than
      # interpolating into the shell to avoid any expression-injection surface.
      env:
        BASE_REF: ${{ github.base_ref }}
      run: |
        # Check if CHANGELOG.md was modified in this PR
        if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -q "CHANGELOG.md"; then
          echo "CHANGELOG.md modified, validating pillar tags..."
          # Make script executable
          chmod +x scripts/check-changelog.sh
          # Run validation (will check for pillar tags in [Unreleased] and version sections)
          scripts/check-changelog.sh || {
            echo "::error::Changelog validation failed. Ensure all sections ([Unreleased] and version sections) have pillar tags."
            echo "::error::See docs/PILLARS.md for pillar definitions: [Reality], [Contracts], [DevX], [Cloud], [AI]"
            echo "::error::See docs/contributing/PILLAR_TAGGING.md for tagging guidelines."
            exit 1
          }
        else
          echo "CHANGELOG.md not modified in this PR, skipping validation."
        fi

  build-binaries:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    needs: [test, warning-gate, security-audit, typos]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: "2G"
      # Set reproducible build flag
      SOURCE_DATE_EPOCH: ${{ github.event.repository.updated_at }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    steps:
    - name: Set per-runner CARGO_HOME
      # `runner.name` is unavailable in workflow- or job-level `env:` blocks
      # (GH Actions context: `runner.*` is step-scoped). Writing to
      # `$GITHUB_ENV` here exports it to every subsequent step in this job,
      # including the rust-toolchain composite action and rust-cache.
      run: echo "CARGO_HOME=/tmp/cargo-mockforge-${{ runner.name }}" >> "$GITHUB_ENV"

    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install Rust toolchain
      uses: ./.github/actions/rust-toolchain
      with:
        targets: ${{ matrix.target }}

    - name: Install protoc (protobuf compiler) on Linux
      if: matrix.os == 'ubuntu-latest'
      run: 'dpkg -s protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev > /dev/null 2>&1 || { echo "::error::Required system deps missing on self-hosted runner. Run on the runner host: sudo apt-get install -y protobuf-compiler libfontconfig1-dev libglib2.0-dev libgtk-3-dev libsoup2.4-dev libasound2-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev"; exit 1; }'
    - name: Install protoc (protobuf compiler) on macOS
      if: runner.os == 'macOS'
      run: brew install protobuf

    - name: Install protoc (protobuf compiler) on Windows
      if: runner.os == 'Windows'
      run: choco install protoc

    - name: Install sccache
      run: |
        SCCACHE_VERSION=0.10.0
        if [ "$RUNNER_OS" == "Linux" ]; then
          SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -L "$SCCACHE_URL" | tar xz
          sudo mv sccache-*/sccache /usr/local/bin/
        elif [ "$RUNNER_OS" == "macOS" ]; then
          SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-apple-darwin.tar.gz"
          curl -L "$SCCACHE_URL" | tar xz
          sudo mv sccache-*/sccache /usr/local/bin/
        elif [ "$RUNNER_OS" == "Windows" ]; then
          SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-pc-windows-msvc.tar.gz"
          curl -L "$SCCACHE_URL" -o sccache.tar.gz
          tar xf sccache.tar.gz
          cp sccache-*/sccache.exe /usr/local/bin/
        fi
        sccache --version

    - name: Verify sccache works
      id: sccache-check
      run: |
        if sccache --start-server 2>/dev/null; then
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
        else
          echo "::warning::sccache unavailable — building without cache"
        fi
      continue-on-error: true

    - name: Cache sccache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/sccache
          ~\.cache\sccache
        key: sccache-build-${{ matrix.target }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        env-vars: "CARGO_HOME"
        key: ${{ matrix.target }}

    - name: Build binary
      run: cargo build --bin mockforge --release --target ${{ matrix.target }}

    - name: Set binary name
      id: set-name
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          echo "binary_name=mockforge.exe" >> $GITHUB_OUTPUT
        else
          echo "binary_name=mockforge" >> $GITHUB_OUTPUT
        fi

    - name: Move binary to dist directory
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/${{ steps.set-name.outputs.binary_name }} dist/${{ matrix.name }}-${{ steps.set-name.outputs.binary_name }}

    - name: Generate SBOM
      run: |
        cargo install cargo-cyclonedx
        cargo cyclonedx --target ${{ matrix.target }}
        mv bom.xml dist/${{ matrix.name }}-sbom.xml

    - name: Upload binary artifacts
      uses: actions/upload-artifact@v7
      with:
        name: mockforge-${{ matrix.name }}
        path: |
          dist/${{ matrix.name }}-${{ steps.set-name.outputs.binary_name }}
          dist/${{ matrix.name }}-sbom.xml

  release:
    name: Create Release
    runs-on: [self-hosted, linux, x64, rust]
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Set per-runner CARGO_HOME
      # `runner.name` is unavailable in workflow- or job-level `env:` blocks
      # (GH Actions context: `runner.*` is step-scoped). Writing to
      # `$GITHUB_ENV` here exports it to every subsequent step in this job,
      # including the rust-toolchain composite action and rust-cache.
      run: echo "CARGO_HOME=/tmp/cargo-mockforge-${{ runner.name }}" >> "$GITHUB_ENV"

    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Create release archive
      run: |
        mkdir -p release
        # Move binaries from artifacts/
        find artifacts -name "*mockforge*" -type f -exec cp {} release/ \;
        # Move example configs
        cp config.example.yaml release/config.example.yaml
        cp config.dev.yaml release/config.dev.yaml
        cp config.prod.yaml release/config.prod.yaml
        ls -la release/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## Changes

          *See the [changelog](CHANGELOG.md) for details.*

          ## Downloads

          - [Linux x64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mockforge-linux-x64-mockforge)
          - [Linux ARM64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mockforge-linux-arm64-mockforge)
          - [macOS x64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mockforge-macOS-x64-mockforge)
          - [macOS ARM64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mockforge-macOS-arm64-mockforge)
          - [Windows x64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mockforge-windows-x64-mockforge.exe)

          ## Files

          - Binaries for all supported platforms
          - Example configuration files
          - SBOM (Software Bill of Materials)
        files: release/*
