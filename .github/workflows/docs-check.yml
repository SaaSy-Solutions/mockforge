name: Docs Check

on:
  pull_request:
    paths:
      - 'book/**'
      - 'scripts/automated-tests/test-docs.sh'
      - '.github/workflows/docs-check.yml'
  workflow_dispatch:

# Push-on-main trigger removed: PR run already verifies the change. Only
# GitHub-internal context is interpolated below (workflow / ref / event_name).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  docs:
    name: Verify mdBook Docs
    runs-on: [self-hosted, linux, x64, rust]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.4.40'

      - name: Install Rust toolchain
        uses: ./.github/actions/rust-toolchain

      - name: Cache mdBook plugins
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin
          key: docs-mdbook-plugins-${{ runner.os }}
          restore-keys: docs-mdbook-plugins-${{ runner.os }}

      - name: Install mdBook plugins
        run: |
          if [ ! -f ~/.cargo/bin/mdbook-toc ]; then
            cargo install mdbook-toc
          fi
          if [ ! -f ~/.cargo/bin/mdbook-mermaid ]; then
            cargo install mdbook-mermaid
          fi

      - name: Run docs verification script
        run: bash scripts/automated-tests/test-docs.sh

      - name: Docs / code drift gate
        # Fails if any MOCKFORGE_* env var or top-level CLI subcommand
        # exists in code without a single mention in user-facing docs.
        # See scripts/check_docs_drift.py for the allowlist.
        run: python3 scripts/check_docs_drift.py

      - name: Config-field drift gate
        # Fails if any public field on a serde-derived config struct in
        # crates/mockforge-chaos/src/config.rs (and its companions) is
        # not mentioned anywhere in user-facing docs. See
        # scripts/check_config_field_drift.py for the target list and
        # allowlist.
        run: python3 scripts/check_config_field_drift.py
